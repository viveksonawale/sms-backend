spring.application.name=society-management

# ── Database ──────────────────────────────────────────────────────────────────
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/sms_db}
spring.datasource.username=${DB_USERNAME:vivek}
spring.datasource.password=${DB_PASSWORD:2005}
spring.datasource.driver-class-name=org.postgresql.Driver

# ── JPA ───────────────────────────────────────────────────────────────────────
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
# Options: none | validate | update | create | create-drop
# use 'update' for dev, 'validate' or 'none' for production

spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ── Connection Pool ───────────────────────────────────────────────────────────
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.connection-timeout=20000

# ── JWT ───────────────────────────────────────────────────────────────────────
# REQUIRED: Set JWT_SECRET in environment (min 32 chars / 256-bit)
jwt.secret=${JWT_SECRET:change-me-in-production-use-min-32-chars!!}

# ── Admin Seeder ──────────────────────────────────────────────────────────────
admin.username=${ADMIN_USERNAME:admin}
admin.password=${ADMIN_PASSWORD:Admin@123}

# ── Logging ───────────────────────────────────────────────────────────────────
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE