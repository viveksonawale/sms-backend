spring.application.name=society-management

# ── Database ──────────────────────────────────────────────────────────────────
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/sms_db}
spring.datasource.username=${DB_USERNAME:vivek}
spring.datasource.password=${DB_PASSWORD:2005}
spring.datasource.driver-class-name=org.postgresql.Driver

# ── SSL (required for Neon) ───────────────────────────────────────────────────
spring.datasource.hikari.data-source-properties.sslmode=require
spring.datasource.hikari.data-source-properties.channelBinding=require

# ── JPA ───────────────────────────────────────────────────────────────────────
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
# Options: none | validate | update | create | create-drop
# use 'update' for dev, 'validate' or 'none' for production

# Set show-sql=false in production (keep true for dev only)
spring.jpa.show-sql=${SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=false

# ── Connection Pool (tuned for Neon serverless pooler) ───────────────────────
# Neon free tier: keep pool small to avoid exceeding connection limits
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.idle-timeout=60000
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.keepalive-time=60000
spring.datasource.hikari.max-lifetime=1800000

# ── JWT ───────────────────────────────────────────────────────────────────────
# REQUIRED: Set JWT_SECRET in environment (min 32 chars / 256-bit)
jwt.secret=${JWT_SECRET:change-me-in-production-use-min-32-chars!!}

# ── Admin Seeder ──────────────────────────────────────────────────────────────
admin.username=${ADMIN_USERNAME:admin}
admin.password=${ADMIN_PASSWORD:Admin@123}

# ── Logging ───────────────────────────────────────────────────────────────────
# Use WARN in production, DEBUG only for local dev
logging.level.org.hibernate.SQL=${HIBERNATE_LOG_LEVEL:WARN}
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=WARN